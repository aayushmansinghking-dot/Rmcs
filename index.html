<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raja Mantri Chor Sipahi - Ultimate</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Poppins:wght@400;600&display=swap');

        :root {
            --gold: #f1c40f; --dark-gold: #d4af37; --royal-red: #e74c3c;
            --royal-dark: #2c3e50; --glass-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            background-size: cover; color: #333; text-align: center;
            margin: 0; padding: 10px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        .logo-container { font-family: 'Cinzel', serif; color: var(--gold); text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 10px; animation: float 3s ease-in-out infinite; }
        .logo-container h1 { margin: 0; font-size: 2.2rem; }

        .container {
            width: 100%; max-width: 600px; background: var(--glass-bg); padding: 20px;
            border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); transition: all 0.5s ease;
        }

        input { padding: 10px; width: 70%; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; font-family: 'Poppins', sans-serif; text-align: center; }
        button {
            padding: 10px 20px; background: linear-gradient(45deg, var(--dark-gold), var(--gold));
            color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
            margin: 5px; box-shadow: 0 4px 15px rgba(241, 196, 15, 0.3); transition: 0.2s;
        }
        button:hover { transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        button:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none;}
        .hidden { display: none !important; }

        /* Game Board */
        .players-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; perspective: 1000px; }
        .player-card {
            border: 3px solid #ddd; padding: 15px; border-radius: 12px; background: white;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); animation: flipIn 0.6s ease-out; transition: transform 0.3s;
        }
        .player-card.is-me { border-color: var(--dark-gold); background: #fffdf5; }
        .player-card.targetable { border: 3px dashed var(--royal-red); animation: pulse 1.5s infinite; }
        .role-text { font-weight: 800; font-size: 18px; margin-top: 5px; color: var(--royal-dark); font-family: 'Cinzel', serif;}

        /* Chat & Voice Module */
        .comms-container { margin-top: 15px; border-top: 2px solid #eee; padding-top: 10px; text-align: left; }
        .chat-box { height: 120px; overflow-y: auto; background: #f9f9f9; border-radius: 8px; padding: 10px; margin-bottom: 10px; font-size: 0.9rem; }
        .chat-msg { margin-bottom: 5px; } .chat-msg strong { color: var(--royal-dark); }
        .chat-input-row { display: flex; gap: 5px; margin-bottom: 10px;}
        .chat-input-row input { width: 100%; margin: 0; text-align: left; padding: 8px;}
        .voice-controls { background: #eef2f5; padding: 10px; border-radius: 8px; text-align: center; }

        /* Modals & Animations */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; animation: fadeIn 0.3s; }
        .modal-content { background: white; padding: 25px; border-radius: 16px; width: 90%; max-width: 400px; text-align: center; animation: slideUp 0.4s ease-out; }
        .score-list { list-style: none; padding: 0; text-align: left; }
        .score-list li { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-weight: bold;}
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes flipIn { 0% { opacity: 0; transform: rotateY(90deg); } 100% { opacity: 1; transform: rotateY(0deg); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); } 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .shake-anim { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }
        .restart-anim { animation: fadeOutIn 0.8s forwards; }
        @keyframes fadeOutIn { 0% { opacity: 1; transform: scale(1);} 50% { opacity: 0; transform: scale(0.9);} 100% { opacity: 1; transform: scale(1);} }
    </style>
</head>
<body>

<div class="logo-container"><h1>👑 RMCS Ultimate</h1></div>

<div class="container" id="mainContainer">
    <div id="setup-screen">
        <h3>Enter Your Name</h3>
        <input type="text" id="playerName" placeholder="Your Name" required>
        <br><button id="createRoomBtn">Create New Game</button>
        <p style="font-size: 0.8rem; color: #888;">OR</p>
        <input type="text" id="roomCodeInput" placeholder="4-Digit Room Code">
        <br><button id="joinRoomBtn" style="background: #34495e;">Join Game</button>
    </div>

    <div id="lobby-screen" class="hidden">
        <h2>Room: <span id="displayRoomCode" style="color: var(--royal-red);"></span></h2>
        <p>Waiting for players...</p>
        <ul id="lobbyPlayerList" style="list-style: none; padding: 0; font-weight: bold;"></ul>
        <div id="hostControls" class="hidden">
            <button id="addBotsBtn" style="background: #27ae60;">Add Bots 🤖</button>
            <button id="startGameBtn" disabled>Start Round</button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div id="actionArea">
            <button id="revealRajaBtn" class="hidden">👑 Reveal Raja!</button>
            <p id="instructionText" style="color: var(--royal-red); font-weight: bold; font-size: 1.1rem; margin: 10px 0;"></p>
        </div>
        <div class="players-grid" id="playersGrid"></div>

        <div class="comms-container">
            <div class="chat-box" id="chatBox"></div>
            <div class="chat-input-row">
                <input type="text" id="chatMsgInput" placeholder="Type a message...">
                <button id="sendChatBtn" style="padding: 8px;">Send</button>
            </div>
            <div class="voice-controls">
                <button id="joinVoiceBtn" style="background: #2980b9; width: 100%; margin: 0;">🎤 Enable Voice Chat</button>
                <div id="voiceStatus" style="font-size: 0.8rem; color: #666; margin-top: 5px;">Status: Mic Offline</div>
                <div id="audioElementsContainer" class="hidden"></div>
            </div>
        </div>
    </div>
</div>

<div id="scoreModal" class="modal hidden">
    <div class="modal-content">
        <h2 style="color: var(--dark-gold); font-family: 'Cinzel', serif; margin-top:0;">Round Over!</h2>
        <p id="roundResultText" style="font-weight: bold; font-size: 1.2rem;"></p>
        <ul id="scoreList" class="score-list"></ul>
        <div id="replayControls" class="hidden">
            <button id="nextRoundBtn">Next Round</button>
            <button id="resetGameBtn" style="background: #e74c3c;">Full Reset</button>
        </div>
        <p id="waitingHostText" class="hidden">Waiting for Host...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 1. Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyDVaexSETiqwiqy1TAaVUMq5--_JaxwTRQ",
        authDomain: "jp-residency-70cbf.firebaseapp.com",
        databaseURL: "https://jp-residency-70cbf-default-rtdb.firebaseio.com",
        projectId: "jp-residency-70cbf",
        storageBucket: "jp-residency-70cbf.firebasestorage.app",
        messagingSenderId: "1084521996397",
        appId: "1:1084521996397:web:30076255d3c65944049f64"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 2. Audio Engine
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        if(type === 'click') { osc.frequency.setValueAtTime(600, now); osc.type = 'sine'; gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(now); osc.stop(now + 0.1); }
        if(type === 'win') { osc.frequency.setValueAtTime(400, now); osc.frequency.setValueAtTime(600, now+0.1); osc.type = 'triangle'; gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.5); osc.start(now); osc.stop(now + 0.5); }
        if(type === 'error') { osc.frequency.setValueAtTime(150, now); osc.type = 'sawtooth'; gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.4); osc.start(now); osc.stop(now + 0.4); }
    }
    document.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => playSound('click')));

    // 3. Global Variables
    let myName = ""; 
    let myId = "p_" + Math.random().toString(36).substr(2, 6);
    let currentRoomCode = ""; let isHost = false; let roomRef = null; let chatRef = null;

    // DOM Elements
    const setupScreen = document.getElementById("setup-screen");
    const lobbyScreen = document.getElementById("lobby-screen");
    const gameScreen = document.getElementById("game-screen");
    const scoreModal = document.getElementById("scoreModal");
    const mainContainer = document.getElementById("mainContainer");
    
    // ==========================================
    // GAME SETUP & LOBBY
    // ==========================================
    document.getElementById("createRoomBtn").addEventListener("click", () => {
        myName = document.getElementById("playerName").value.trim();
        if(!myName) return;
        currentRoomCode = Math.floor(1000 + Math.random() * 9000).toString();
        isHost = true; roomRef = ref(db, 'rooms/' + currentRoomCode);
        set(roomRef, {
            status: "waiting", turnState: "setup", lastResult: "", roundKey: Date.now(),
            players: { [myId]: { name: myName, role: "", score: 0, isBot: false, revealed: false } }
        });
        enterLobby(); listenToRoom(); setupChat();
    });

    document.getElementById("joinRoomBtn").addEventListener("click", async () => {
        myName = document.getElementById("playerName").value.trim();
        currentRoomCode = document.getElementById("roomCodeInput").value.trim();
        if(!myName || !currentRoomCode) return;
        roomRef = ref(db, 'rooms/' + currentRoomCode);
        const snap = await get(roomRef);
        if(snap.exists() && snap.val().status === "waiting") {
            await update(ref(db, 'rooms/' + currentRoomCode + '/players'), { [myId]: { name: myName, role: "", score: 0, isBot: false, revealed: false } });
            enterLobby(); listenToRoom(); setupChat();
        } else alert("Room not found or game already started!");
    });

    document.getElementById("addBotsBtn").addEventListener("click", async () => {
        const snap = await get(roomRef);
        let updates = {};
        for(let i=0; i < (4 - Object.keys(snap.val().players).length); i++){
            updates["bot_" + Math.random().toString(36).substr(2, 6)] = { name: "Bot 🤖", role: "", score: 0, isBot: true, revealed: false };
        }
        await update(ref(db, 'rooms/' + currentRoomCode + '/players'), updates);
    });

    // ==========================================
    // CORE GAME LOGIC
    // ==========================================
    async function startRound(resetScores) {
        mainContainer.classList.add("restart-anim");
        setTimeout(async () => {
            const snap = await get(roomRef);
            let roles = ["Raja", "Mantri", "Sipahi", "Chor"].sort(() => Math.random() - 0.5);
            let updates = { status: "playing", turnState: "raja_turn", roundKey: Date.now() };
            Object.keys(snap.val().players).forEach((id, i) => {
                updates[`players/${id}/role`] = roles[i];
                updates[`players/${id}/revealed`] = false;
                if(resetScores) updates[`players/${id}/score`] = 0;
            });
            await update(roomRef, updates);
            mainContainer.classList.remove("restart-anim");
        }, 400);
    }
    
    document.getElementById("startGameBtn").onclick = () => startRound(false);
    document.getElementById("nextRoundBtn").onclick = () => startRound(false);
    document.getElementById("resetGameBtn").onclick = () => startRound(true);

    let currentRoundKey = null;

    function listenToRoom() {
        onValue(roomRef, (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            const players = data.players;
            
            if(data.status === "waiting") {
                document.getElementById("lobbyPlayerList").innerHTML = Object.keys(players).map(id => `<li>${players[id].name}</li>`).join("");
                if(isHost) { document.getElementById("hostControls").classList.remove("hidden"); document.getElementById("startGameBtn").disabled = Object.keys(players).length !== 4; }
            }

            if(data.status === "playing") {
                if(currentRoundKey !== data.roundKey) { currentRoundKey = data.roundKey; playSound('win'); }
                scoreModal.classList.add("hidden"); lobbyScreen.classList.add("hidden"); gameScreen.classList.remove("hidden");
                renderGameBoard(data);
                if(isHost) handleBotTurns(data);
            }

            if(data.status === "round_over") showScoreboard(data);
        });
    }

    function renderGameBoard(data) {
        const grid = document.getElementById("playersGrid");
        grid.innerHTML = "";
        let myRole = data.players[myId].role;

        Object.keys(data.players).forEach(id => {
            const p = data.players[id];
            const isRevealed = p.revealed || id === myId;
            const roleTxt = isRevealed ? (p.role === "Raja"?"👑":p.role==="Mantri"?"🧑‍⚖️":p.role==="Sipahi"?"👮‍♂️":"🦹‍♂️") + " " + p.role : "❓ Chit";
            
            const card = document.createElement("div");
            card.className = `player-card ${id === myId ? 'is-me' : ''}`;
            card.innerHTML = `<div>${p.name}</div><div class="role-text">${roleTxt}</div>`;
            
            // Sipahi Guessing Logic
            if(data.turnState === "sipahi_guessing" && myRole === "Sipahi" && id !== myId && !p.revealed) {
                card.classList.add("targetable");
                card.onclick = () => makeGuess(id, data);
            }
            grid.appendChild(card);
        });

        const rBtn = document.getElementById("revealRajaBtn"); rBtn.classList.add("hidden");
        const ins = document.getElementById("instructionText");

        if(data.turnState === "raja_turn") {
            if(myRole === "Raja") { rBtn.classList.remove("hidden"); ins.innerText = "You are Raja! Reveal yourself."; rBtn.onclick = () => update(roomRef, { [`players/${myId}/revealed`]: true, turnState: "sipahi_guessing" }); }
            else ins.innerText = "Waiting for Raja to reveal...";
        } else if (data.turnState === "sipahi_guessing") {
            if(myRole === "Sipahi") { update(roomRef, { [`players/${myId}/revealed`]: true }); ins.innerText = "Sipahi! Catch the Chor!"; }
            else ins.innerText = "Sipahi is investigating...";
        }
    }

    async function makeGuess(targetId, data) {
        const isCorrect = data.players[targetId].role === "Chor";
        if(isCorrect) playSound('win'); else playSound('error');
        if(!isCorrect) { mainContainer.classList.add("shake-anim"); setTimeout(() => mainContainer.classList.remove("shake-anim"), 500); }

        let updates = { status: "round_over", lastResult: isCorrect ? "🎉 Sipahi caught the Chor!" : "❌ Wrong! Sipahi caught the Mantri!" };
        Object.keys(data.players).forEach(id => {
            let r = data.players[id].role; let s = data.players[id].score;
            updates[`players/${id}/revealed`] = true;
            if(r === "Raja") updates[`players/${id}/score`] = s + 1000;
            if(r === "Mantri") updates[`players/${id}/score`] = s + 800;
            if(r === "Sipahi") updates[`players/${id}/score`] = s + (isCorrect ? 500 : 0);
            if(r === "Chor") updates[`players/${id}/score`] = s + (isCorrect ? 0 : 500);
        });
        await update(roomRef, updates);
    }

    function handleBotTurns(data) {
        if(data.turnState === "raja_turn") {
            const b = Object.keys(data.players).find(id => data.players[id].role === "Raja");
            if(b && data.players[b].isBot && !data.players[b].revealed) setTimeout(() => update(roomRef, { [`players/${b}/revealed`]: true, turnState: "sipahi_guessing" }), 1500);
        }
        if(data.turnState === "sipahi_guessing") {
            const b = Object.keys(data.players).find(id => data.players[id].role === "Sipahi");
            if(b && data.players[b].isBot && !data.players[b].revealed) {
                update(roomRef, { [`players/${b}/revealed`]: true });
                setTimeout(() => {
                    const h = Object.keys(data.players).filter(id => !data.players[id].revealed && id !== b && data.players[id].role !== "Raja");
                    makeGuess(h[Math.floor(Math.random() * h.length)], data);
                }, 3000);
            }
        }
    }

    function showScoreboard(data) {
        scoreModal.classList.remove("hidden");
        document.getElementById("roundResultText").innerText = data.lastResult;
        document.getElementById("roundResultText").style.color = data.lastResult.includes("🎉") ? "#27ae60" : "var(--royal-red)";
        document.getElementById("scoreList").innerHTML = Object.keys(data.players).sort((a,b) => data.players[b].score - data.players[a].score).map(id => `<li><span>${data.players[id].name} (${data.players[id].role})</span> <span>${data.players[id].score}</span></li>`).join("");
        if(isHost) { document.getElementById("replayControls").classList.remove("hidden"); document.getElementById("waitingHostText").classList.add("hidden"); }
        else { document.getElementById("replayControls").classList.add("hidden"); document.getElementById("waitingHostText").classList.remove("hidden"); }
    }

    function enterLobby() { setupScreen.classList.add("hidden"); lobbyScreen.classList.remove("hidden"); document.getElementById("displayRoomCode").innerText = currentRoomCode; }

    // ==========================================
    // TEXT CHAT MODULE
    // ==========================================
    function setupChat() {
        chatRef = ref(db, 'rooms/' + currentRoomCode + '/chat');
        const chatBox = document.getElementById("chatBox");
        onChildAdded(chatRef, (data) => {
            const msg = data.val();
            chatBox.innerHTML += `<div class="chat-msg"><strong>${msg.name}:</strong> ${msg.text}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        });
document.getElementById("sendChatBtn").onclick = () => {
            const input = document.getElementById("chatMsgInput");
            if(input.value.trim()) { push(chatRef, { name: myName, text: input.value.trim() }); input.value = ""; }
        };
        // Allow pressing Enter to send
        document.getElementById("chatMsgInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") { document.getElementById("sendChatBtn").click(); }
        });
    }

    // ==========================================
    // 🎤 WEBRTC VOICE CHAT MODULE
    // ==========================================
    let localStream = null;
    let peers = {}; 
    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    document.getElementById("joinVoiceBtn").addEventListener("click", async () => {
        if(!currentRoomCode) return;
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            document.getElementById("joinVoiceBtn").innerText = "🎤 Mic Active";
            document.getElementById("joinVoiceBtn").style.background = "#27ae60";
            document.getElementById("voiceStatus").innerText = "Status: Connected to Voice";
            
            // Announce presence
            set(ref(db, `rooms/${currentRoomCode}/webrtc/users/${myId}`), true);
            
            // Listen for signaling data directed to me
            onChildAdded(ref(db, `rooms/${currentRoomCode}/webrtc/signals/${myId}`), async (snap) => {
                const data = snap.val();
                const senderId = snap.key;
                
                if(!peers[senderId]) createPeerConnection(senderId);
                
                if(data.type === 'offer') {
                    await peers[senderId].setRemoteDescription(new RTCSessionDescription(data));
                    const answer = await peers[senderId].createAnswer();
                    await peers[senderId].setLocalDescription(answer);
                    set(ref(db, `rooms/${currentRoomCode}/webrtc/signals/${senderId}/${myId}`), { type: answer.type, sdp: answer.sdp });
                } else if (data.type === 'answer') {
                    await peers[senderId].setRemoteDescription(new RTCSessionDescription(data));
                } else if (data.type === 'candidate') {
                    await peers[senderId].addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            });

            // Listen for new users joining to initiate calls
            onChildAdded(ref(db, `rooms/${currentRoomCode}/webrtc/users`), async (snap) => {
                const newUserId = snap.key;
                if(newUserId !== myId && !peers[newUserId]) {
                    const pc = createPeerConnection(newUserId);
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    set(ref(db, `rooms/${currentRoomCode}/webrtc/signals/${newUserId}/${myId}`), { type: offer.type, sdp: offer.sdp });
                }
            });
            
            // Clean up signals to avoid clutter
            remove(ref(db, `rooms/${currentRoomCode}/webrtc/signals/${myId}`));

        } catch (err) {
            console.error(err); alert("Microphone access denied!");
        }
    });

    function createPeerConnection(peerId) {
        const pc = new RTCPeerConnection(rtcConfig);
        peers[peerId] = pc;

        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

        pc.onicecandidate = (event) => {
            if(event.candidate) {
                push(ref(db, `rooms/${currentRoomCode}/webrtc/signals/${peerId}/${myId}_ice`), { type: 'candidate', candidate: event.candidate.toJSON() });
            }
        };

        pc.ontrack = (event) => {
            let audioEl = document.getElementById(`audio_${peerId}`);
            if(!audioEl) {
                audioEl = document.createElement("audio");
                audioEl.id = `audio_${peerId}`;
                audioEl.autoplay = true;
                document.getElementById("audioElementsContainer").appendChild(audioEl);
            }
            audioEl.srcObject = event.streams[0];
        };
        return pc;
    }
</script>
</body>
</html>
